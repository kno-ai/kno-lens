  <!-- Cardinal arms (outer) -->
  <line x1="64" y1="20" x2="64" y2="27" stroke="#4DFFC4" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="101" x2="64" y2="108" stroke="#4DFFC4" stroke-width="2" stroke-linecap="round"/>

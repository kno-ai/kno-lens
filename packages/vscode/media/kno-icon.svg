  <line x1="64" y1="29" x2="64" y2="36" stroke="#4DFFC4" stroke-width="1.25" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="92" x2="64" y2="99" stroke="#4DFFC4" stroke-width="1.25" stroke-linecap="round" opacity="0.5"/>

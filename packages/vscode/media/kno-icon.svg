  <line x1="89.5" y1="38.5" x2="84.5" y2="43.5" stroke="#4DFFC4" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="38.5" y1="89.5" x2="43.5" y2="84.5" stroke="#4DFFC4" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="89.5" y1="89.5" x2="84.5" y2="84.5" stroke="#4DFFC4" stroke-width="1" stroke-linecap="round" opacity="0.35"/>


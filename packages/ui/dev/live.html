<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lens-ui live</title>
    <style>
      .live-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .live-dot--connected {
        background: #4ec9b0;
      }
      .live-dot--disconnected {
        background: #f44747;
      }
      .session-label {
        margin-left: 12px;
        color: #888;
        font-size: 12px;
      }
      .error-label {
        margin-left: 12px;
        color: #f44747;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./live.tsx"></script>
  </body>
</html>
